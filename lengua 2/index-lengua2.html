<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Materias - GitHub Pages</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-text: #1c1e21;
            --accent-blue: #007bff;
            --hover-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e1e4e8;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
            border-color: var(--accent-blue);
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--accent-blue);
        }

        .card p {
            margin: 0;
            font-size: 0.9rem;
            color: #65676b;
            text-align: center;
        }

        .badge {
            background: #e7f3ff;
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        /* Estilos para la barra de navegación */
.main-nav {
    background: var(--primary-text);
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.main-nav a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: bold;
    padding: 5px 15px;
    border-radius: 5px;
    transition: background 0.3s;
}

.main-nav a:hover {
    background: var(--accent-blue);
}

.main-nav a.home-btn {
    background: #444;
}
    </style>
</head>
<body>

    <header>
        <h1>Mi Repositorio de Estudio</h1>
        <p>Selecciona una categoría para revisar el material</p>
    </header>
<nav class="main-nav">
    <!-- Si es el index principal de la raíz, usa href="index.html" -->
    <!-- Si es un index dentro de una carpeta, usa href="../index.html" -->
    <a href="../index.html" class="home-btn">🏠 Inicio</a> 
    
    <a href="../lengua 2/index.html">Lengua 2</a>
    <a href="../gramatica 2/index.html">Gramática 2</a>
    <a href="../udi 2/index.html">UDI 2</a>
</nav>
    <div class="container">
        <div class="grid-container">
            
            <!-- Carpeta Lengua 2 -->
            <a href="lengua 2/l2-tarjetas-Unit 1.html" class="card" target="_blank">
                <span class="badge">Archivo</span>
                <p>Acceder a Tarjetas Unit 1.html</p>
            </a>

            <!-- Carpeta Gramática 2 -->
            <a href="lengua 2/l2-tarjetas-Unit 2.html" class="card" target="_blank">
                <span class="badge">Archivo</span>
                <p>Acceder a Tarjetas Unit 2.html</p>
            </a>

            

        </div>
    </div>

</body>
</html>
